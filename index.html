<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #ffe6eb, #fff, #ffeef3, #fff);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

@keyframes bgMove {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

.card {
  width: 420px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  text-align: center;
  animation: fadeIn 0.8s ease;
  position: relative;
  z-index: 2;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h2 {
  margin-bottom: 10px;
}

p {
  font-size: 16px;
  line-height: 1.6;
  color: #333;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  margin: 8px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 15px;
}

.next { background:#ff4d6d; color:white; }
.yes { background:#28a745; color:white; }
.no { background:#ccc; }

button:hover {
  transform: scale(1.05);
}

.grow {
  transform: scale(1.3);
}

/* soft hearts */
.heart {
  position: absolute;
  color: #ff4d6d;
  opacity: 0.6;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh); opacity: 0;}
}

/* fade transitions */
.fade {
  animation: fadeIn 0.5s ease;
}
</style>
</head>

<body>

<div class="card" id="card">
  <h2>Hey Atinuke ❤️</h2>
  <p>Before anything… just take your time with this.</p>
  <button class="next" onclick="nextStep(1)">Start 💌</button>
</div>

<script>
let noClicks = 0;

function render(html){
  const card = document.getElementById("card");
  card.classList.remove("fade");
  void card.offsetWidth;
  card.classList.add("fade");
  card.innerHTML = html;
}

function nextStep(step){

  if(step === 1){
    render(`
      <h2>So...</h2>
      <p>
        Being around you feels calm.<br><br>
        Like I don’t have to pretend or force anything.
      </p>
      <button class="next" onclick="nextStep(2)">Continue</button>
    `);
  }

  else if(step === 2){
    render(`
      <h2>Honestly...</h2>
      <p>
        You’re really stunning.<br><br>
        But it’s more than that… it’s how easy you make everything feel.
      </p>
      <button class="next" onclick="nextStep(3)">Keep going</button>
    `);
  }

  else if(step === 3){
    render(`
      <h2>Real talk...</h2>
      <p>
        I didn’t expect to feel this comfortable this fast.<br><br>
        And I don’t want to just leave this as a talking stage.
      </p>
      <button class="next" onclick="nextStep(4)">Okay...</button>
    `);
  }

  else if(step === 4){
    render(`
      <h2>One last thing...</h2>
      <p>Take a moment before you answer this.</p>
      <button class="next" onclick="finalStep()">Continue</button>
    `);
  }
}

function finalStep(){
  setTimeout(() => {
    render(`
      <h2>So here it is ❤️</h2>
      <p>Will you be my girlfriend?</p>

      <button class="yes" onclick="yes()">Yes 💖</button>
      <button class="no" id="noBtn" onclick="no()">No 😭</button>
    `);
  }, 800);
}

function yes(){
  render(`
    <h2>❤️</h2>
    <p>
      I’m really glad I did this.<br><br>
      You just made my day.
    </p>
  `);
  startHearts();
}

function no(){
  noClicks++;
  const btn = document.getElementById("noBtn");

  if(noClicks === 1){
    btn.classList.add("grow");
    btn.innerText = "Are you sure?";
  }
  else if(noClicks === 2){
    btn.innerText = "Think again…";
  }
  else{
    btn.style.display = "none";
    document.getElementById("card").innerHTML += `
      <p style="margin-top:15px;">I’ll wait 😌</p>
    `;
  }
}

function startHearts(){
  setInterval(() => {
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerText = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random() * 18 + 10) + "px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
  }, 400);
}
</script>

</body>
</html>
