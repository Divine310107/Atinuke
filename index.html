<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6eb, #fff);
      text-align: center;
      padding: 50px;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 420px;
      margin: auto;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade {
      animation: fadeIn 0.5s ease;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      margin: 10px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .next { background: #ff4d6d; color: white; }
    .yes { background: #28a745; color: white; }
    .no { background: #ccc; }

    .grow {
      transform: scale(1.3);
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<div class="card" id="content">
  <h2>Hey Atinuke 😊</h2>
  <p>Don’t overthink this… just go through it</p>
  <button class="next" onclick="nextStep(1)">Next 💌</button>
</div>

<script>
  let noClicks = 0;

  function render(html) {
    const content = document.getElementById("content");
    content.classList.remove("fade");
    void content.offsetWidth; // reset animation
    content.classList.add("fade");
    content.innerHTML = html;
  }

  function nextStep(step) {

    if (step === 1) {
      render(`
        <h2>So...</h2>
        <p>Being around you just feels easy.<br><br>
        Like I don’t have to force anything… I can just be myself.</p>
        <button class="next" onclick="nextStep(2)">Continue ❤️</button>
      `);
    }

    else if (step === 2) {
      render(`
        <h2>And honestly...</h2>
        <p>It’s not just how you look.<br><br>
        It’s how calm I feel around you… it’s different.</p>
        <button class="next" onclick="nextStep(3)">Keep going 😭</button>
      `);
    }

    else if (step === 3) {
      render(`
        <h2>Real talk...</h2>
        <p>I don’t want this to stay as just a talking stage.<br><br>
        I want something real with you.</p>
        <button class="next" onclick="nextStep(4)">Okay...</button>
      `);
    }

    else if (step === 4) {
      render(`
        <h2>So here it is...</h2>
        <p>Will you be my girlfriend? 💕</p>
        <button class="yes" onclick="yes()">Yes 💖</button>
        <button class="no" id="noBtn" onclick="no()">No 😭</button>
      `);
    }
  }

  function yes() {
    render(`
      <h2>🥺❤️</h2>
      <p>I’m really glad I did this.<br><br>
      Come here 🫶</p>
    `);
  }

  function no() {
    noClicks++;
    const noBtn = document.getElementById("noBtn");

    if (noClicks === 1) {
      noBtn.classList.add("grow");
      noBtn.innerText = "Are you sure? 😭";
    } 
    else if (noClicks === 2) {
      noBtn.innerText = "Think again… 😔";
    } 
    else {
      noBtn.style.display = "none";
      document.getElementById("content").innerHTML += `
        <p style="margin-top:15px;">I’ll wait for you 😌</p>
      `;
    }
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }

  setInterval(createHeart, 500);
</script>

</body>
</html>
