<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat 💬</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e5ddd5;
      padding: 20px;
    }

    .chat {
      max-width: 420px;
      margin: auto;
      background: #fff;
      height: 90vh;
      border-radius: 15px;
      padding: 15px;
      overflow-y: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .msg {
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 12px;
      width: fit-content;
      max-width: 80%;
      opacity: 0;
      transform: translateY(10px);
      animation: pop 0.4s forwards;
    }

    @keyframes pop {
      to { opacity: 1; transform: translateY(0); }
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .you {
      background: #fff;
      border: 1px solid #ddd;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    .yes { background: #25d366; color: white; }
    .no { background: #ccc; }

    .grow {
      transform: scale(1.2);
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<div class="chat" id="chat"></div>

<script>
  const chat = document.getElementById("chat");
  let noClicks = 0;

  function addMsg(text, sender="you") {
    const div = document.createElement("div");
    div.classList.add("msg", sender);
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function typing(callback, delay=1500) {
    const t = document.createElement("div");
    t.classList.add("msg", "you", "typing");
    t.innerHTML = "typing...";
    chat.appendChild(t);
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
      t.remove();
      callback();
    }, delay);
  }

  function start() {
    setTimeout(() => {
      addMsg("Hey Atinuke 😊", "you");

      typing(() => {
        addMsg("Don’t overthink this… just read.", "you");

        setTimeout(step1, 1200);
      }, 1500);
    }, 500);
  }

  function step1() {
    typing(() => {
      addMsg("Being around you just feels easy.", "you");
      addMsg("Like I don’t have to force anything… I can just be myself.", "you");

      setTimeout(step2, 1500);
    }, 1800);
  }

  function step2() {
    typing(() => {
      addMsg("And it’s not just how you look.", "you");
      addMsg("It’s how calm I feel when I talk to you.", "you");

      setTimeout(step3, 1800);
    }, 1800);
  }

  function step3() {
    typing(() => {
      addMsg("I don’t want this to stay as just a talking stage.", "you");

      setTimeout(finalQuestion, 2000);
    }, 1800);
  }

  function finalQuestion() {
    typing(() => {
      addMsg("So I’ll just ask you directly...", "you");

      setTimeout(() => {
        addMsg("Will you be my girlfriend? 💕", "you");

        const btnWrap = document.createElement("div");

        const yes = document.createElement("button");
        yes.classList.add("yes");
        yes.innerText = "Yes 💖";
        yes.onclick = () => {
          addMsg("🥺❤️ I’m really happy you said yes.", "you");
          startHearts();
        };

        const no = document.createElement("button");
        no.classList.add("no");
        no.innerText = "No 😭";
        no.onclick = () => {
          noClicks++;

          if (noClicks === 1) {
            no.classList.add("grow");
            no.innerText = "Are you sure? 😭";
          } 
          else if (noClicks === 2) {
            no.innerText = "Don’t do that. Choose yes 😔";
          } 
          else {
            no.style.display = "none";
            addMsg("I’ll wait for you 😌", "you");
          }
        };

        btnWrap.appendChild(yes);
        btnWrap.appendChild(no);
        chat.appendChild(btnWrap);

      }, 1000);
    }, 1500);
  }

  function startHearts() {
    setInterval(() => {
      const h = document.createElement("div");
      h.classList.add("heart");
      h.innerText = "❤️";
      h.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(h);

      setTimeout(() => h.remove(), 6000);
    }, 400);
  }

  start();
</script>

</body>
</html>
