<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #ffe6eb, #fff, #ffeef3, #fff);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

@keyframes bgMove {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

/* glow behind card */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(255,100,130,0.2), transparent 70%);
  filter: blur(80px);
  z-index: 0;
}

/* card */
.card {
  width: 420px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius: 22px;
  padding: 32px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.15);
  text-align: center;
  position: relative;
  z-index: 2;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h2 {
  margin-bottom: 10px;
  font-weight: 600;
}

p {
  font-size: 15px;
  line-height: 1.7;
  color: #444;
}

/* buttons */
button {
  padding: 12px 22px;
  border: none;
  border-radius: 14px;
  margin: 8px;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.25s ease;
}

.next { background:#ff4d6d; color:white; }
.yes { background:#28a745; color:white; }
.no { background:#ddd; }

button:hover {
  transform: scale(1.05);
}

.grow {
  transform: scale(1.3);
}

/* fade transition */
.fade {
  animation: fadeIn 0.5s ease;
}

/* hearts */
.heart {
  position: absolute;
  color: #ff4d6d;
  opacity: 0.6;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh); opacity: 0;}
}

/* intro screen */
.intro {
  text-align: center;
  cursor: pointer;
  animation: fadeIn 1s ease;
}

.intro h2 {
  font-weight: 500;
}
</style>
</head>

<body>

<div class="glow"></div>

<div id="app">
  <div class="intro" onclick="start()">
    <h2>💌</h2>
    <p>You’ve got something…<br>Tap to open</p>
  </div>
</div>

<script>
let noClicks = 0;

function render(html){
  const app = document.getElementById("app");
  app.innerHTML = `<div class="card fade">${html}</div>`;
}

function delayRender(html, time=400){
  setTimeout(() => render(html), time);
}

function start(){
  delayRender(`
    <h2>Hey Atinuke ❤️</h2>
    <p>Before anything… just take your time with this.</p>
    <button class="next" onclick="nextStep(1)">Start</button>
  `);
}

function nextStep(step){

  if(step === 1){
    delayRender(`
      <h2>So...</h2>
      <p>
        Being around you feels calm.<br><br>
        Like I don’t have to pretend or force anything.
      </p>
      <button class="next" onclick="nextStep(2)">Continue</button>
    `);
  }

  else if(step === 2){
    delayRender(`
      <h2>Honestly...</h2>
      <p>
        You’re really stunning.<br><br>
        But more than that… it’s how easy everything feels with you.
      </p>
      <button class="next" onclick="nextStep(3)">Keep going</button>
    `);
  }

  else if(step === 3){
    delayRender(`
      <h2>Real talk...</h2>
      <p>
        I didn’t expect to feel this comfortable this fast.<br><br>
        And I don’t want to leave this as just a talking stage.
      </p>
      <button class="next" onclick="nextStep(4)">Okay...</button>
    `);
  }

  else if(step === 4){
    delayRender(`
      <h2>One more thing...</h2>
      <p>I’ve been thinking about this for a while.</p>
    `);

    setTimeout(() => {
      render(`
        <h2>So here it is ❤️</h2>
        <p>Will you be my girlfriend?</p>

        <button class="yes" onclick="yes()">Yes 💖</button>
        <button class="no" id="noBtn" onclick="no()">No 😭</button>
      `);
    }, 2200);
  }
}

function yes(){
  render(`
    <h2>❤️</h2>
    <p>
      I’m really glad I didn’t keep this to myself.<br><br>
      — John
    </p>
  `);
  startHearts();
}

function no(){
  noClicks++;
  const btn = document.getElementById("noBtn");

  if(noClicks === 1){
    btn.classList.add("grow");
    btn.innerText = "Are you sure?";
  }
  else if(noClicks === 2){
    btn.innerText = "Think again…";
  }
  else{
    btn.style.display = "none";
    document.querySelector(".card").innerHTML += `
      <p style="margin-top:15px;">That’s okay… I just wanted you to know how I feel.</p>
    `;
  }
}

function startHearts(){
  setInterval(() => {
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerText = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random() * 18 + 10) + "px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
  }, 400);
}
</script>

</body>
</html>
