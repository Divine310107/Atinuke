<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6eb, #fff);
      text-align: center;
      padding: 50px;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 420px;
      margin: auto;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      margin: 10px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .next { background: #ff4d6d; color: white; }
    .yes { background: #28a745; color: white; }
    .no { background: #ccc; }

    .grow {
      transform: scale(1.3);
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card" id="content">
  <h2>Hey Atinuke 😊</h2>
  <p>Don't overthink this... just go through it</p>
  <button class="next" onclick="startExperience()">Next 💌</button>
</div>

<script>
  let noClicks = 0;
  let musicStarted = false;

  function startExperience() {
    if (!musicStarted) {
      const music = document.getElementById("bgMusic");
      music.volume = 0; // start silent
      music.play();

      // smooth fade-in
      let vol = 0;
      const fade = setInterval(() => {
        if (vol < 0.5) {
          vol += 0.05;
          music.volume = vol;
        } else {
          clearInterval(fade);
        }
      }, 200);

      musicStarted = true;
    }
    nextStep(1);
  }

  function nextStep(step) {
    const content = document.getElementById("content");

    if (step === 1) {
      content.innerHTML = `
        <h2>So...</h2>
        <p>Being around you just feels easy.<br><br>
        Like I don’t have to force anything, I can just be myself.</p>
        <button class="next" onclick="nextStep(2)">Continue ❤️</button>
      `;
    }

    else if (step === 2) {
      content.innerHTML = `
        <h2>And honestly...</h2>
        <p>You’re actually stunning.<br><br>
        Not just how you look, but everything about you.</p>
        <button class="next" onclick="nextStep(3)">Wait... 😭</button>
      `;
    }

    else if (step === 3) {
      content.innerHTML = `
        <h2>Truth is...</h2>
        <p>I don’t want this to just be a talking stage.<br><br>
        I want something real with you.</p>
        <button class="next" onclick="nextStep(4)">Okay… last one</button>
      `;
    }

    else if (step === 4) {
      content.innerHTML = `
        <h2>So here's my question...</h2>
        <p>Will you be my girlfriend? 💕</p>
        <button class="yes" onclick="yes()">Yes 💖</button>
        <button class="no" id="noBtn" onclick="no()">No 😭</button>
      `;
    }
  }

  function yes() {
    document.getElementById("content").innerHTML = `
      <h2>🥺❤️</h2>
      <p>You just made me the happiest guy alive.<br><br>
      Come here 🫶</p>
    `;
  }

  function no() {
    noClicks++;
    const noBtn = document.getElementById("noBtn");

    if (noClicks === 1) {
      noBtn.classList.add("grow");
      noBtn.innerText = "Are you sure? 😭";
    } 
    else if (noClicks === 2) {
      noBtn.innerText = "Don’t do that. Choose yes 😭";
    } 
    else {
      noBtn.style.display = "none";
    }
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }

  setInterval(createHeart, 500);
</script>

</body>
</html>
